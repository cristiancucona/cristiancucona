name: Functions Tests (Emulator)

on:
  push:
    paths:
      - "functions/**"
      - ".github/workflows/functions-tests.yml"
  pull_request:
    paths:
      - "functions/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
          cache-dependency-path: functions/package.json

      - name: Install deps and build
        run: |
          pnpm install
          pnpm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run unit + integration tests with Emulator
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_STORAGE_EMULATOR_HOST: 127.0.0.1:9199
          FUNCTIONS_EMULATOR: "true"
        run: |
          # Go up to the root folder because firebase.json is there
          cd ..
          firebase emulators:exec --project demo-selio-stocks-v1 'cd functions && pnpm test'
